gateway:
  host: "0.0.0.0"
  port: 8080
  debug: true

platforms:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
  feishu:
    enabled: true
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    verification_token: "${FEISHU_VERIFICATION_TOKEN}"
  wechat:
    enabled: false
    webhook_url: "${WECHAT_WEBHOOK_URL}"

mcp:
  server_name: "message-hub"
  version: "1.0.0"
  tools:
    - name: search_web
      enabled: true
    - name: chat_with_llm
      enabled: true
    - name: call_api
      enabled: true
    - name: send_message
      enabled: true

routing:
  keyword_match:
    enabled: true
    rules:
      - keywords: ["天气", "weather", "查天气"]
        agent: "search"
        action: "weather"
      - keywords: ["翻译", "translate"]
        agent: "llm"
        action: "translate"
      - keywords: ["搜索", "search", "查"]
        agent: "search"
        action: "web_search"
      - keywords: ["你好", "hello", "hi"]
        agent: "llm"
        action: "greeting"
  ai_routing:
    enabled: true
    model: "deepseek-chat"
    max_tokens: 1000
    temperature: 0.7

llm:
  default_model: "deepseek-chat"
  providers:
    deepseek:
      base_url: "https://api.deepseek.com/v1"
      api_key: "${OPENAI_API_KEY}"
    openai:
      base_url: "https://api.openai.com/v1"
      api_key: "${OPENAI_API_KEY}"
    anthropic:
      base_url: "https://api.anthropic.com"
      api_key: "${ANTHROPIC_API_KEY}"

search:
  default_engine: "tavily"
  engines:
    tavily:
      enabled: true
      api_key: "${TAVILY_API_KEY}"
    google:
      enabled: false
      api_key: "${GOOGLE_API_KEY}"
      cse_id: "${GOOGLE_CSE_ID}"
    duckduckgo:
      enabled: true

logging:
  level: "INFO"
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{name}</cyan>:<cyan>{function}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
  file:
    enabled: true
    path: "logs/app.log"
    rotation: "100 MB"
    retention: "7 days"
