# ============================================================
# Proxy Configuration
# ============================================================
#
# 代理配置说明:
#   - mihomo 运行在 NAS (192.168.1.2) 上
#   - HTTP 代理端口: 7890
#   - SOCKS5 代理端口: 7891
#   - 控制面板端口: 9090
#

# Mihomo (Clash.Meta) 代理配置
mihomo:
  enabled: true
  # NAS IP 地址
  host: "192.168.1.2"
  http_port: 7890
  socks_port: 7891
  control_port: 9090
  # 健康检查
  health_check:
    enabled: true
    url: "http://192.168.1.2:9090"

# Environment-based proxy (used by default)
env_proxy:
  http: "${HTTP_PROXY}"
  https: "${HTTPS_PROXY}"
  no_proxy: "${NO_PROXY}"

# Custom proxy servers (备用)
proxies:
  - name: "vmess-primary"
    type: "vmess"
    enabled: false  # 使用 NAS 上的 mihomo
    server: "${VMESS_SERVER}"
    port: 443
    uuid: "${VMESS_UUID}"
    alter_id: 0
    network: "tcp"
    security: "auto"

# Domain-based routing rules
# 域名规则 - 在代码中使用
routing:
  # 需要走代理的域名
  proxy_domains:
    - "*.google.com"
    - "*.googleapis.com"
    - "*.googleusercontent.com"
    - "*.youtube.com"
    - "*.googlevideo.com"
    - "tavily.com"
    - "api.tavily.com"
    - "github.com"
    - "api.github.com"
    - "*.openai.com"
    - "*.anthropic.com"

  # 需要直连的域名
  direct_domains:
    - "*.baidu.com"
    - "*.taobao.com"
    - "*.qq.com"
    - "*.feishu.cn"
    - "open.feishu.cn"
    - "api.feishu.cn"
    - "localhost"
    - "127.0.0.1"

  # Fallback mode when no matching rule
  fallback: "proxy"

# Health check settings
health_check:
  enabled: true
  interval: 60  # seconds
  timeout: 10   # seconds
  url: "https://api.tavily.com"

# Auto-failover settings
failover:
  enabled: true
  max_retries: 3
  retry_delay: 1  # seconds
