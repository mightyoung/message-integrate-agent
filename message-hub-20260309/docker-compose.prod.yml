# ============================================================
# Message Integrate Agent - Production Docker Compose
# ============================================================
#
# 架构说明:
#   - gateway: 主服务，飞书 WebSocket 长连接
#   - mihomo: 代理服务，处理非中国大陆 IP 请求
#   - bettafish: 舆情分析服务
#   - mirofish: 预测分析服务
#
# 一键部署: docker-compose -f docker-compose.prod.yml up -d
#
# ============================================================

services:
  # -------------------------------------------------------
  # Main Gateway Service
  # -------------------------------------------------------
  gateway:
    image: message-integrate-agent:prod
    container_name: message-hub-gateway
    expose:
      - "8080"
      - "8081"
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./config:/app/config:ro
      - message-hub-logs:/app/logs
      - message-hub-learnings:/app/.learnings
    env_file:
      - .env.prod
    environment:
      # 飞书 WebSocket 长连接模式
      - FEISHU_CONNECTION_MODE=websocket
      # 代理配置 - 通过 mihomo 访问非中国大陆 IP
      - HTTP_PROXY=http://mihomo:7890
      - HTTPS_PROXY=http://mihomo:7890
      - NO_PROXY=localhost,127.0.0.1,api.feishu.cn,open.feishu.cn,192.168.0.0/16
      # 生产环境
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      # BettaFish API
      - BETTAFISH_URL=http://bettafish:5000
      # MiroFish API
      - MIROFISH_URL=http://mirofish:5001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - message-hub-net
    depends_on:
      mihomo:
        condition: service_started
      bettafish:
        condition: service_started
      mirofish:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------
  # Mihomo Proxy - 代理服务
  # -------------------------------------------------------
  mihomo:
    image: ghcr.io/tautcony/mihomo:latest
    container_name: message-hub-mihomo
    privileged: true
    network_mode: host
    volumes:
      - ./config/clash:/root/.config/clash:ro
      - message-hub-clash:/etc/clash
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - message-hub-net

  # -------------------------------------------------------
  # BettaFish - 舆情分析服务
  # -------------------------------------------------------
  bettafish:
    build:
      context: ./bettafish
      dockerfile: Dockerfile
    container_name: message-hub-bettafish
    expose:
      - "5000"
      - "5001"
    ports:
      - "5000:5000"
      - "5001:5001"
    env_file:
      - .env.prod
    environment:
      # DeepSeek API 配置
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-chat}
      # 代理配置
      - HTTP_PROXY=http://mihomo:7890
      - HTTPS_PROXY=http://mihomo:7890
      - NO_PROXY=localhost,127.0.0.1,api.feishu.cn,open.feishu.cn,192.168.0.0/16
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - message-hub-net

  # -------------------------------------------------------
  # MiroFish - 预测分析服务
  # -------------------------------------------------------
  mirofish:
    build:
      context: ./mirofish
      dockerfile: Dockerfile
    container_name: message-hub-mirofish
    expose:
      - "5001"
      - "3000"
    ports:
      - "5001:5001"
      - "3000:3000"
    env_file:
      - .env.prod
    environment:
      # DeepSeek API 配置
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-chat}
      # 代理配置
      - HTTP_PROXY=http://mihomo:7890
      - HTTPS_PROXY=http://mihomo:7890
      - NO_PROXY=localhost,127.0.0.1,api.feishu.cn,open.feishu.cn,192.168.0.0/16
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - message-hub-net

# -------------------------------------------------------
# Networks
# -------------------------------------------------------
networks:
  message-hub-net:
    driver: bridge

# -------------------------------------------------------
# Volumes
# -------------------------------------------------------
volumes:
  message-hub-logs:
  message-hub-learnings:
  message-hub-clash:
