# ============================================================
# Message Integrate Agent - Production Docker Compose
# ============================================================
#
# 架构说明:
#   - gateway: 主服务，飞书 WebSocket 长连接
#   - bettafish: 舆情分析服务
#   - mirofish: 预测分析服务
#   - mihomo: 代理服务
#
# 依赖:
#   - mihomo: 代理服务（需要配置文件 clash.yaml）
#
# 一键部署: docker-compose -f docker-compose.prod.yml up -d
#
# ============================================================

services:
  # -------------------------------------------------------
  # Mihomo Proxy Service
  # -------------------------------------------------------
  mihomo:
    image: dreamacro/clash:latest
    container_name: message-hub-mihomo
    ports:
      - "7890:7890"
      - "7891:7891"
      - "9090:9090"
    volumes:
      - ./config/clash:/root/.config/clash:ro
    restart: unless-stopped
    networks:
      - message-hub-net
    # 允许外部流量通过代理
    cap_add:
      - NET_ADMIN
  # -------------------------------------------------------
  # Main Gateway Service
  # -------------------------------------------------------
  gateway:
    image: message-integrate-agent:prod
    container_name: message-hub-gateway
    expose:
      - "8080"
      - "8081"
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./config:/app/config:ro
      - message-hub-logs:/app/logs
      - message-hub-learnings:/app/.learnings
    env_file:
      - .env.prod
    environment:
      # 飞书 WebSocket 长连接模式
      - FEISHU_CONNECTION_MODE=websocket
      # 生产环境
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      # 代理配置 - mihomo 代理
      - HTTP_PROXY=http://mihomo:7890
      - HTTPS_PROXY=http://mihomo:7890
      # 不走代理的域名 - LLM API 直连
      - NO_PROXY=localhost,127.0.0.1,api.feishu.cn,open.feishu.cn,192.168.0.0/16,api.deepseek.com,api.openai.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - message-hub-net
    depends_on:
      mihomo:
        condition: service_started
      bettafish:
        condition: service_started
      mirofish:
        condition: service_started
    extra_hosts:
      # 解决容器内解析主机名问题
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
          cpus: "0.25"
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------
  # BettaFish - 舆情分析服务
  # -------------------------------------------------------
  bettafish:
    image: bettafish:latest
    container_name: message-hub-bettafish
    expose:
      - "5000"
    ports:
      - "5000:5000"
    env_file:
      - .env.prod
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - message-hub-net

  # -------------------------------------------------------
  # MiroFish - 预测分析服务
  # -------------------------------------------------------
  mirofish:
    image: mirofish:latest
    container_name: message-hub-mirofish
    expose:
      - "5001"
    ports:
      - "5001:5001"
    env_file:
      - .env.prod
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - message-hub-net

# -------------------------------------------------------
# Networks
# -------------------------------------------------------
networks:
  message-hub-net:
    driver: bridge

# -------------------------------------------------------
# Volumes
# -------------------------------------------------------
volumes:
  message-hub-logs:
  message-hub-learnings:
