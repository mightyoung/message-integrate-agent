# ============================================================
# Message Integrate Agent - Production Docker Compose
# ============================================================
#
# 架构说明:
#   - gateway: 主服务，飞书 WebSocket 长连接
#   - postgres: PostgreSQL + pgvector 数据库
#   - redis: 缓存服务
#   - minio: S3 兼容对象存储
#
# 一键部署: docker-compose -f docker-compose.prod.yml up -d
#
# ============================================================

services:
  # -------------------------------------------------------
  # PostgreSQL + pgvector Database
  # -------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: message-hub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intelligence_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - message-hub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Redis Cache
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: message-hub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - message-hub-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # MinIO S3 Storage
  # -------------------------------------------------------
  minio:
    image: minio/minio
    container_name: message-hub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - message-hub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # -------------------------------------------------------
  # Main Gateway Service
  # -------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: message-integrate-agent:prod
    container_name: message-hub-gateway
    expose:
      - "8080"
      - "8081"
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env.prod
    environment:
      # 数据库连接
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/intelligence_db
      # Redis 连接
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # S3 连接
      - S3_ENDPOINT_URL=http://minio:9000
      # 生产环境
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config:ro
      - message-hub-logs:/app/logs
      - message-hub-learnings:/app/.learnings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - message-hub-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
          cpus: "0.25"

# -------------------------------------------------------
# Networks
# -------------------------------------------------------
networks:
  message-hub-net:
    driver: bridge

# -------------------------------------------------------
# Volumes
# -------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  minio_data:
  message-hub-logs:
  message-hub-learnings:
