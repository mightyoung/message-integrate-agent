# ============================================================
# Message Integrate Agent - Production Docker Compose
# ============================================================
#
# 架构说明:
#   - gateway: 主服务，飞书 WebSocket 长连接
#   - 数据存储在 NAS 上 (PostgreSQL, Redis, RustFs)
#
# 一键部署: docker-compose -f docker-compose.prod.yml up -d
#
# ============================================================

services:
  # -------------------------------------------------------
  # Main Gateway Service
  # -------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: message-integrate-agent:prod
    container_name: message-hub-gateway
    expose:
      - "8080"
      - "8081"
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env.prod
    environment:
      # 使用 NAS 上的服务
      - DATABASE_URL=postgresql://postgres:postgres@192.168.1.2:45041/bs_generator_db
      - REDIS_HOST=192.168.1.2
      - REDIS_PORT=40967
      - S3_ENDPOINT_URL=http://192.168.1.2:37163
      # 生产环境
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config:ro
      - message-hub-logs:/app/logs
      - message-hub-learnings:/app/.learnings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
          cpus: "0.25"

# -------------------------------------------------------
# Volumes
# -------------------------------------------------------
volumes:
  message-hub-logs:
  message-hub-learnings:
