# ============================================================
# CI/CD Workflow - Message Integrate Agent
# ============================================================
#
# 工作流说明:
#   - 语法检查: 验证 Python 代码语法
#   - 依赖检查: 确保依赖可安装
#   - 单元测试: 运行基本测试
#
# ============================================================

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # -------------------------------------------------------
  # 语法检查
  # -------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Check Python syntax
        run: |
          python -m py_compile src/**/*.py || true

      - name: Check YAML syntax
        run: |
          python -c "import yaml; yaml.safe_load(open('config/settings.yaml'))"
          python -c "import yaml; yaml.safe_load(open('config/proxy.yaml'))"

  # -------------------------------------------------------
  # 安全扫描
  # -------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check for secrets in code
        run: |
          # 检查是否意外提交了敏感信息
          echo "=== 检查硬编码的 API Keys ==="
          grep -r "sk-\|AKIA\|ghp_\|firebase" src/ --include="*.py" || echo "未发现硬编码密钥"

      - name: Check .env files are ignored
        run: |
          echo "=== 检查 .gitignore 配置 ==="
          grep -q "\.env" .gitignore && echo ".env 已在 .gitignore 中"
          grep -q "\.env.prod" .gitignore && echo ".env.prod 已在 .gitignore 中"

  # -------------------------------------------------------
  # Docker 构建测试
  # -------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          load: true
          tags: message-integrate-agent:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          FEISHU_APP_ID: test
          FEISHU_APP_SECRET: test
          OPENAI_API_KEY: sk-test

      - name: Verify image exists
        run: |
          docker images message-integrate-agent:test
