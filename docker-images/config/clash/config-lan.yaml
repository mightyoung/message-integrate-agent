# ============================================================
# Clash 配置文件 - 允许 LAN 访问 + VMess 代理
# ============================================================

# API 控制面板
external-controller: 0.0.0.0:9090
allow-lan: true
mode: rule

# 代理端口 (绑定到 0.0.0.0)
port: 7890
socks-port: 7891

# 日志级别
log-level: info

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1

# 代理节点 - VMess 配置 (请替换为您的代理配置)
proxies:
  - name: "vmess-primary"
    type: vmess
    server: your-server.example.com
    port: 12345
    uuid: 00000000-0000-0000-0000-000000000000
    alterId: 0
    cipher: auto
    network: tcp
    tls: true
    skip-cert-verify: true
    servername: your-server.example.com

# 代理组
proxy-groups:
  - name: "auto"
    type: select
    proxies:
      - vmess-primary

# 规则 - 国内直连，海外代理
rules:
  # 飞书直连
  - DOMAIN-SUFFIX,feishu.cn,DIRECT
  - DOMAIN-SUFFIX,lark.cn,DIRECT
  - DOMAIN-KEYWORD,open.feishu.cn,DIRECT
  - DOMAIN-SUFFIX,open.feishu.cn,DIRECT

  # 国内域名直连
  - DOMAIN-SUFFIX,baidu.com,DIRECT
  - DOMAIN-SUFFIX,qq.com,DIRECT
  - DOMAIN-SUFFIX,taobao.com,DIRECT
  - DOMAIN-SUFFIX,aliyun.com,DIRECT
  - DOMAIN-SUFFIX,tencent.com,DIRECT

  # 国内 IP 段直连
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT

  # 其他海外域名走代理
  - GEOIP,CN,DIRECT
  - MATCH,auto
